name: rc_ui
description: Shared UI component library and theme for RC configurator apps.
publish_to: none

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10+1
  flutter_riverpod: ^2.5.1
  lucide_icons_flutter: ^3.1.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/src/assets/assets/
    - lib/src/assets/assets/tabbar/
    - lib/src/assets/assets/mixing/
    - lib/src/assets/assets/drive_mode/
    - lib/src/assets/fonts/

  fonts:
    - family: Roboto
      fonts:
        - asset: lib/src/assets/fonts/Roboto-Regular.ttf
        - asset: lib/src/assets/fonts/Roboto-Bold.ttf
          weight: 700
    - family: Noto Sans SC
      fonts:
        - asset: lib/src/assets/fonts/NotoSansSC-Regular.otf
        - asset: lib/src/assets/fonts/NotoSansSC-Bold.otf
          weight: 700
